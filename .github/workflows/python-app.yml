name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pyinstaller-windows:
    name: Build Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Validate package imports
        run: python -m compileall pakexplorer pakexplorer_tk run.py

      - name: Build executable
        run: python -m PyInstaller pakexplorer.spec --noconfirm --clean

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: pakexplorer-windows
          path: dist/pakexplorer.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pakexplorer.exe
